workflows:

  # Debug 构建 + IPA
  debug-build:
    name: Debug Build + IPA
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      xcode: "16.2"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
      cancel_previous_builds: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Build for device
        script: |
          xcodebuild build \
            -project FishEyeStabilizer.xcodeproj \
            -scheme FishEyeStabilizer \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package unsigned IPA
        script: |
          APP_PATH=$(find $HOME/Library/Developer/Xcode/DerivedData -name "FishEye*.app" -path "*/Debug-iphoneos/*" 2>/dev/null | head -1)
          echo "Found app: $APP_PATH"
          mkdir -p $CM_BUILD_DIR/build/Payload
          cp -R "$APP_PATH" $CM_BUILD_DIR/build/Payload/
          cd $CM_BUILD_DIR/build
          zip -r FishEyeStabilizer-unsigned.ipa Payload/
          ls -lh FishEyeStabilizer-unsigned.ipa
    artifacts:
      - build/FishEyeStabilizer-unsigned.ipa

  # Release Archive + IPA
  release-build:
    name: Release Build (Unsigned IPA)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: "16.2"
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
      cancel_previous_builds: true
    scripts:
      - name: Install XcodeGen & Generate
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Build unsigned archive
        script: |
          xcodebuild archive \
            -project FishEyeStabilizer.xcodeproj \
            -scheme FishEyeStabilizer \
            -archivePath "$CM_BUILD_DIR/FishEyeStabilizer.xcarchive" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Export unsigned IPA
        script: |
          mkdir -p $CM_BUILD_DIR/Payload
          cp -R "$CM_BUILD_DIR/FishEyeStabilizer.xcarchive/Products/Applications/"*.app $CM_BUILD_DIR/Payload/
          cd $CM_BUILD_DIR
          zip -r FishEyeStabilizer-unsigned.ipa Payload/
          ls -lh FishEyeStabilizer-unsigned.ipa
    artifacts:
      - FishEyeStabilizer-unsigned.ipa
      - FishEyeStabilizer.xcarchive
