# XcodeGen 项目配置
# Codemagic 会在构建前自动运行: xcodegen generate
# 生成 .xcodeproj 文件，避免将二进制工程文件提交到 git

name: FishEyeStabilizer

options:
  bundleIdPrefix: com.fisheye
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    SWIFT_STRICT_CONCURRENCY: "minimal"

targets:
  FishEyeStabilizer:
    type: application
    platform: iOS
    sources:
      # Swift 源文件（按目录添加，避免 XcodeGen 产生重复 group 引用）
      - path: FishEyeStabilizerApp.swift
      - path: Models
        type: group
      - path: Views
        type: group
      - path: ViewModels
        type: group
      - path: Services
        type: group
      - path: Shaders
        type: group
      - path: Resources
        type: group
      - path: Info.plist
    settings:
      base:
        INFOPLIST_FILE: "Info.plist"
        PRODUCT_BUNDLE_IDENTIFIER: com.fisheye.stabilizer
        PRODUCT_NAME: "FishEye Stabilizer"
        DEVELOPMENT_TEAM: ""  # 无证书构建，留空
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        PROVISIONING_PROFILE_SPECIFIER: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        SWIFT_STRICT_CONCURRENCY: "minimal"
        SWIFT_TREAT_WARNINGS_AS_ERRORS: "NO"
        ENABLE_PREVIEWS: "NO"
        # Metal 编译器设置
        MTL_ENABLE_DEBUG_INFO: "$(INCLUDE_DEBUG_INFORMATION_IN_METAL)"
        # Info.plist 权限配置
        INFOPLIST_KEY_NSCameraUsageDescription: "用于拍摄视频并进行实时鱼眼矫正和地平线防抖处理"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "用于访问相册中的视频进行后期畸变矫正和防抖处理"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "用于将处理后的视频保存到相册"
