# XcodeGen 项目配置
# Codemagic 会在构建前自动运行: xcodegen generate
# 生成 .xcodeproj 文件，避免将二进制工程文件提交到 git

name: FishEyeStabilizer

options:
  bundleIdPrefix: com.fisheye
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  FishEyeStabilizer:
    type: application
    platform: iOS
    sources:
      # 所有源文件和资源
      - path: .
        includes:
          - "**/*.swift"
          - "**/*.metal"
          - "Resources/**"
        excludes:
          - ".git/**"
    settings:
      base:
        INFOPLIST_FILE: "Info.plist"
        PRODUCT_BUNDLE_IDENTIFIER: com.fisheye.stabilizer
        PRODUCT_NAME: "FishEye Stabilizer"
        DEVELOPMENT_TEAM: ""  # 无证书构建，留空
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        PROVISIONING_PROFILE_SPECIFIER: ""
        # Metal 编译器设置
        MTL_ENABLE_DEBUG_INFO: "$(INCLUDE_DEBUG_INFORMATION_IN_METAL)"
        MTL_COMPILER_FLAGS: "-fcikernel"
        # Info.plist 权限配置
        INFOPLIST_KEY_NSCameraUsageDescription: "用于拍摄视频并进行实时鱼眼矫正和地平线防抖处理"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "用于访问相册中的视频进行后期畸变矫正和防抖处理"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "用于将处理后的视频保存到相册"
    preBuildScripts:
      # 构建前确保 Metal 库正确编译
      - name: "Metal Compile Check"
        script: |
          echo "Metal shader files found:"
          find "${SRCROOT}" -name "*.metal" -type f
        basedOnDependencyAnalysis: false
